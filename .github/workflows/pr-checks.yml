name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            style
            build
            revert

  size:
    name: Size limit (<600 changed lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Lines in lockfiles, generated files, and vendored third-party
            // content do not count toward the limit (see CONTRIBUTING.md).
            const EXCLUDED = [
              /^pnpm-lock\.yaml$/,
              /^skills-lock\.json$/,
              /^\.agents\//,
              /^\.claude\//,
            ];
            const LIMIT = 600;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            let total = 0;
            for (const f of files) {
              if (EXCLUDED.some((re) => re.test(f.filename))) continue;
              total += f.additions + f.deletions;
            }

            core.info(`Counted changed lines (after exclusions): ${total}`);
            if (total >= LIMIT) {
              core.setFailed(
                `PR changes ${total} lines (limit ${LIMIT}, excluding lockfiles ` +
                  `and vendored content). Split it into stacked PRs — see CONTRIBUTING.md.`,
              );
            }
